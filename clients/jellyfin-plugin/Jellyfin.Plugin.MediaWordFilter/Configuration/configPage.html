<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Media Word Filter</title>
    <style>
        .mwf-config .fieldDescription { opacity: 0.75; margin-top: 0.35rem; }
        .mwf-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1rem; }
        #mwf-test-result { margin-top: 0.75rem; white-space: pre-wrap; }
        .mwf-ok { color: #3dd68c; }
        .mwf-err { color: #ff6b6b; }
    </style>
</head>
<body>
    <div id="MediaWordFilterConfigPage" data-role="page" class="page type-interior pluginConfigurationPage mwf-config" data-require="emby-input,emby-button,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <form id="MediaWordFilterConfigForm">
                    <div class="sectionTitleContainer">
                        <h2 class="sectionTitle">Media Word Filter</h2>
                    </div>
                    <p>
                        Admin-only settings. Jellyfin Web users never configure an MWF URL —
                        the plugin proxies mute data through <code>/MediaWordFilter/…</code>.
                        Requires the <strong>File Transformation</strong> plugin so the client script can load.
                    </p>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="mwfBaseUrl">MWF base URL</label>
                        <input is="emby-input" type="text" id="mwfBaseUrl" name="mwfBaseUrl" />
                        <div class="fieldDescription">Example: <code>http://mwf:8787</code> or <code>http://192.168.1.10:8787</code></div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="mwfTimeout">Request timeout (seconds)</label>
                        <input is="emby-input" type="number" id="mwfTimeout" name="mwfTimeout" min="1" max="120" />
                    </div>

                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label class="emby-checkbox-label">
                            <input is="emby-checkbox" type="checkbox" id="mwfDetailsUi" />
                            <span>Enable details-page profile / filter controls</span>
                        </label>
                    </div>
                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label class="emby-checkbox-label">
                            <input is="emby-checkbox" type="checkbox" id="mwfOsdUi" />
                            <span>Enable playback OSD settings button</span>
                        </label>
                    </div>
                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label class="emby-checkbox-label">
                            <input is="emby-checkbox" type="checkbox" id="mwfPrefetch" />
                            <span>Prefetch mute data for the next episode</span>
                        </label>
                    </div>

                    <div class="mwf-actions">
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save</span>
                        </button>
                        <button is="emby-button" type="button" class="raised block emby-button" id="mwfTestBtn">
                            <span>Test MWF connection</span>
                        </button>
                    </div>
                    <div id="mwf-test-result"></div>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            var MediaWordFilterConfig = {
                pluginUniqueId: 'a8e3f2c1-9b4d-4e7a-8f1c-2d6b5a9e0c34'
            };

            function mwfRead(config, pascal, camel, fallback) {
                if (config[pascal] !== undefined && config[pascal] !== null) return config[pascal];
                if (config[camel] !== undefined && config[camel] !== null) return config[camel];
                return fallback;
            }

            function mwfWrite(config, pascal, camel, value) {
                config[pascal] = value;
                config[camel] = value;
            }

            document.querySelector('#MediaWordFilterConfigPage')
                .addEventListener('pageshow', function () {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(MediaWordFilterConfig.pluginUniqueId).then(function (config) {
                        document.querySelector('#mwfBaseUrl').value = mwfRead(config, 'MwfBaseUrl', 'mwfBaseUrl', '') || '';
                        document.querySelector('#mwfTimeout').value = mwfRead(config, 'RequestTimeoutSeconds', 'requestTimeoutSeconds', 10);
                        document.querySelector('#mwfDetailsUi').checked = mwfRead(config, 'EnableDetailsUi', 'enableDetailsUi', true) !== false;
                        document.querySelector('#mwfOsdUi').checked = mwfRead(config, 'EnableOsdUi', 'enableOsdUi', true) !== false;
                        document.querySelector('#mwfPrefetch').checked = mwfRead(config, 'EnablePrefetch', 'enablePrefetch', true) !== false;
                        Dashboard.hideLoadingMsg();
                    }).catch(function () {
                        Dashboard.hideLoadingMsg();
                    });
                });

            document.querySelector('#MediaWordFilterConfigForm')
                .addEventListener('submit', function (e) {
                    e.preventDefault();
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(MediaWordFilterConfig.pluginUniqueId).then(function (config) {
                        mwfWrite(config, 'MwfBaseUrl', 'mwfBaseUrl', (document.querySelector('#mwfBaseUrl').value || '').trim());
                        mwfWrite(config, 'RequestTimeoutSeconds', 'requestTimeoutSeconds', parseInt(document.querySelector('#mwfTimeout').value, 10) || 10);
                        mwfWrite(config, 'EnableDetailsUi', 'enableDetailsUi', !!document.querySelector('#mwfDetailsUi').checked);
                        mwfWrite(config, 'EnableOsdUi', 'enableOsdUi', !!document.querySelector('#mwfOsdUi').checked);
                        mwfWrite(config, 'EnablePrefetch', 'enablePrefetch', !!document.querySelector('#mwfPrefetch').checked);

                        return ApiClient.updatePluginConfiguration(MediaWordFilterConfig.pluginUniqueId, config).then(function (result) {
                            Dashboard.processPluginConfigurationUpdateResult(result);
                        });
                    }).catch(function (err) {
                        Dashboard.hideLoadingMsg();
                        Dashboard.alert({
                            title: 'Save failed',
                            message: (err && err.statusText) ? err.statusText : String(err || 'Unknown error')
                        });
                    });
                    return false;
                });

            document.querySelector('#mwfTestBtn')
                .addEventListener('click', function () {
                    var el = document.querySelector('#mwf-test-result');
                    el.className = '';
                    el.textContent = 'Testing…';
                    var url = ApiClient.getUrl('MediaWordFilter/health');
                    ApiClient.ajax({ type: 'GET', url: url, dataType: 'json' })
                        .then(function (data) {
                            el.className = 'mwf-ok';
                            el.textContent = 'OK: ' + JSON.stringify(data);
                        })
                        .catch(function (err) {
                            el.className = 'mwf-err';
                            el.textContent = 'Failed: ' + ((err && err.statusText) ? err.statusText : String(err));
                        });
                });
        </script>
    </div>
</body>
</html>
