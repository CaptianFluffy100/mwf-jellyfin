# Example script-opts for mwf_mute.lua
#
# Install next to JMP's scripts/ folder as:
#   macOS:  ~/Library/Application Support/Jellyfin Media Player/script-opts/mwf_mute.conf
#   Linux:  ~/.local/share/jellyfinmediaplayer/script-opts/mwf_mute.conf
#
# Do NOT put this file in scripts/ — only .lua scripts belong there. A .conf in
# scripts/ makes mpv log: Can't load unknown script: …/scripts/mwf_mute.conf
#
# On a Mac talking to mwf on another machine (e.g. Beast), api_base MUST be that
# host's LAN IP — 127.0.0.1 is the Mac itself and will never reach the server.

api_base=http://192.168.x.x:8787
# Optional if using a personalized downloaded script (already baked in):
# jellyfin_user_id=YOUR_JELLYFIN_USER_GUID
poll_interval=0.1
enabled=yes
osd_on_mute=yes

# Keys (JMP/mpv). Ctrl+Shift works on Mac JMP; Alt+m/Alt+i are also bound in the
# script as secondary but often fail on macOS (Option inserts special characters).
toggle_key=Ctrl+Shift+m
status_key=Ctrl+Shift+i

# Optional: force a Jellyfin item id (32-hex or dashed GUID) when discovery fails
# item_id=aafa65b4706ed0a41d615c31f059da83
